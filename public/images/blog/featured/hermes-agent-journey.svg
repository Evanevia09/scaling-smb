<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0055ff"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="180" fill="url(#glow1)" filter="url(#softGlow)"/>
  <circle cx="1000" cy="480" r="200" fill="url(#glow2)" filter="url(#softGlow)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08">
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#fff"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Left side: Old messy workflow (before) -->
  <g opacity="0.3" transform="translate(80, 140)">
    <!-- Scattered sticky notes -->
    <rect x="0" y="0" width="60" height="50" rx="3" fill="#e8c547" opacity="0.5"/>
    <rect x="50" y="60" width="55" height="45" rx="3" fill="#e86a47" opacity="0.5"/>
    <rect x="15" y="110" width="50" height="40" rx="3" fill="#47b8e8" opacity="0.5"/>
    <!-- Scattered lines (messy notes) -->
    <line x1="8" y1="12" x2="50" y2="12" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="20" x2="45" y2="20" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="28" x2="40" y2="28" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="58" y1="72" x2="95" y2="72" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="58" y1="80" x2="90" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <!-- Cross marks -->
    <line x1="70" y1="10" x2="85" y2="25" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
    <line x1="85" y1="10" x2="70" y2="25" stroke="#ff4444" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Arrow in the middle: transition -->
  <g transform="translate(470, 280)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#accent)" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
    <polygon points="200,-6 215,0 200,6" fill="url(#accent)" opacity="0.8"/>
    <!-- Arrow glow -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#accent)" stroke-width="6" opacity="0.15" filter="url(#softGlow)"/>
  </g>

  <!-- Right side: AI agent automated flow (after) -->
  <g transform="translate(720, 100)">
    <!-- Circle node: AI Agent hub -->
    <circle cx="80" cy="160" r="50" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <circle cx="80" cy="160" r="45" fill="url(#accent)" opacity="0.12"/>
    <!-- AI icon inside -->
    <text x="80" y="167" text-anchor="middle" fill="#0088ff" font-family="sans-serif" font-size="28" font-weight="bold">AI</text>

    <!-- Signal rings emanating from AI -->
    <circle cx="80" cy="160" r="65" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.25">
      <animate attributeName="r" values="50;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="160" r="65" fill="none" stroke="#0088ff" stroke-width="1" opacity="0.15">
      <animate attributeName="r" values="50;95" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Connected nodes: tools -->
    <!-- Content -->
    <g>
      <rect x="260" y="40" width="95" height="40" rx="6" fill="none" stroke="#0055ff" stroke-width="1.5" opacity="0.8"/>
      <text x="307" y="65" text-anchor="middle" fill="#6699ff" font-family="sans-serif" font-size="10" font-weight="600">BLOG</text>
      <line x1="130" y1="150" x2="260" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- SEO -->
    <g>
      <rect x="260" y="110" width="95" height="40" rx="6" fill="none" stroke="#0055ff" stroke-width="1.5" opacity="0.8"/>
      <text x="307" y="135" text-anchor="middle" fill="#6699ff" font-family="sans-serif" font-size="10" font-weight="600">SEO</text>
      <line x1="130" y1="155" x2="260" y2="130" stroke="#0055ff" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Social -->
    <g>
      <rect x="260" y="180" width="95" height="40" rx="6" fill="none" stroke="#0055ff" stroke-width="1.5" opacity="0.8"/>
      <text x="307" y="205" text-anchor="middle" fill="#6699ff" font-family="sans-serif" font-size="10" font-weight="600">SOCIAL</text>
      <line x1="130" y1="165" x2="260" y2="200" stroke="#0055ff" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Analytics -->
    <g>
      <rect x="260" y="250" width="95" height="40" rx="6" fill="none" stroke="#0055ff" stroke-width="1.5" opacity="0.8"/>
      <text x="307" y="275" text-anchor="middle" fill="#6699ff" font-family="sans-serif" font-size="10" font-weight="600">ANALYTICS</text>
      <line x1="130" y1="170" x2="260" y2="270" stroke="#0055ff" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Checkmarks on connected nodes -->
    <circle cx="345" cy="60" r="8" fill="#00cc66" opacity="0.8"/>
    <line x1="341" y1="60" x2="343" y2="63" stroke="#fff" stroke-width="1.5"/>
    <line x1="343" y1="63" x2="349" y2="57" stroke="#fff" stroke-width="1.5"/>

    <circle cx="345" cy="130" r="8" fill="#00cc66" opacity="0.8"/>
    <line x1="341" y1="130" x2="343" y2="133" stroke="#fff" stroke-width="1.5"/>
    <line x1="343" y1="133" x2="349" y2="127" stroke="#fff" stroke-width="1.5"/>

    <circle cx="345" cy="200" r="8" fill="#00cc66" opacity="0.8"/>
    <line x1="341" y1="200" x2="343" y2="203" stroke="#fff" stroke-width="1.5"/>
    <line x1="343" y1="203" x2="349" y2="197" stroke="#fff" stroke-width="1.5"/>

    <circle cx="345" cy="270" r="8" fill="#00cc66" opacity="0.8"/>
    <line x1="341" y1="270" x2="343" y2="273" stroke="#fff" stroke-width="1.5"/>
    <line x1="343" y1="273" x2="349" y2="267" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- Title text -->
  <text x="600" y="500" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="32" font-weight="800" letter-spacing="-0.03">
    <tspan x="600" dy="0">I Replaced My Marketing Agency With</tspan>
    <tspan x="600" dy="42" fill="url(#accent)">an Open-Source AI Agent</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="570" text-anchor="middle" fill="#8899bb" font-family="sans-serif" font-size="14" opacity="0.7">
    <tspan x="600" dy="0">scalingsmb.com</tspan>
  </text>
</svg>
