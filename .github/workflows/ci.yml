name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx astro check
      - run: npx vitest run
      - run: npm run build

# Deploy handled by Cloudflare Pages native Git integration
# — every push to main auto-triggers build + deploy on Cloudflare's infra.
# Config: https://dash.cloudflare.com → Workers & Pages → scaling-smb
